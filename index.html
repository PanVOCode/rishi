            {"id":44,"name":"юбка нецирк голубая","price":15000,"oldPrice":null,"category":"skirts","image":"img/6b01f52006498a3ae6e9fd9d07498318.jpg"},
            {"id":45,"name":"юбка-волна голубой","price":15000,"oldPrice":null,"category":"skirts","image":"img/90937138.jpg"},
            {"id":46,"name":"юбка со шлейфом","price":25000,"oldPrice":null,"category":"skirts","image":"img/72786200.jpg"}
        ];

        const CATEGORIES = {
            jeans: { name: 'Джинсы', icon: '👖' },
            leggings: { name: 'Лосины', icon: '🧬' },
            corsets: { name: 'Корсеты', icon: '💎' },
            coats: { name: 'Куртки', icon: '🧥' },
            dresses: { name: 'Платья', icon: '👗' },
            skirts: { name: 'Юбки', icon: '⛓️' },
            accessories: { name: 'Аксессуары', icon: '👜' }
        };

        // ============ STATE MANAGEMENT ============
        const state = {
            currentPage: 'home',
            cart: JSON.parse(localStorage.getItem('rishi_cart') || '[]'),
            wishlist: JSON.parse(localStorage.getItem('rishi_wishlist') || '[]'),
            searchQuery: '',
            selectedFilters: {
                category: null,
                priceMin: 0,
                priceMax: 100000
            }
        };

        // ============ UTILS ============
        function formatPrice(price) {
            return new Intl.NumberFormat('ru-RU').format(price);
        }

        function saveCart() {
            localStorage.setItem('rishi_cart', JSON.stringify(state.cart));
        }

        function saveWishlist() {
            localStorage.setItem('rishi_wishlist', JSON.stringify(state.wishlist));
        }

        function addToCart(productId) {
            const product = PRODUCTS.find(p => p.id === productId);
            if (!product) return;

            const existing = state.cart.find(item => item.id === productId);
            if (existing) {
                existing.quantity += 1;
            } else {
                state.cart.push({ ...product, quantity: 1 });
            }
            saveCart();
            showNotification('Добавлено в корзину');
            render();
        }

        function removeFromCart(productId) {
            state.cart = state.cart.filter(item => item.id !== productId);
            saveCart();
            render();
        }

        function toggleWishlist(productId) {
            const idx = state.wishlist.findIndex(id => id === productId);
            if (idx >= 0) {
                state.wishlist.splice(idx, 1);
            } else {
                state.wishlist.push(productId);
            }
            saveWishlist();
            render();
        }

        function isInWishlist(productId) {
            return state.wishlist.includes(productId);
        }

        function getCartTotal() {
            return state.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        }

        function getCartCount() {
            return state.cart.reduce((sum, item) => sum + item.quantity, 0);
        }

        function showNotification(msg) {
            const notif = document.createElement('div');
            notif.className = 'fixed top-24 right-4 bg-black text-white px-4 py-2 rounded z-50';
            notif.textContent = msg;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 2000);
        }

        // ============ PAGE RENDERERS ============
        function renderHome() {
            return `
                <!-- HERO SECTION - Summer 2026 with UTP Focus -->

                    <div class="relative h-full flex flex-col justify-center items-center text-center px-4">

                                </a>
                                <a href="#about" class="border border-white text-white px-8 py-3 rounded font-semibold hover:bg-white hover:text-black transition">
                                    О бренде
                                </a>
                            </div>
                        </div>

                        <!-- Hero Features -->
                        <div class="absolute bottom-16 left-0 right-0">
                            <div class="flex justify-center gap-4 md:gap-8 text-white text-xs md:text-sm flex-wrap px-4">
                                <div class="flex items-center gap-2">
                                    <span class="text-2xl">♻️</span>
                                    <span>100% Апсайкл</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="text-2xl">✋</span>
                                    <span>Ручная работа</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="text-2xl">🌍</span>
                                    <span>Без отходов</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Featured Products Section -->
                <section class="py-20 px-4 bg-white">
                    <div class="max-w-7xl mx-auto">
                        <h2 class="font-display text-4xl mb-12 text-center">Новинки сезона</h2>

                            ${PRODUCTS.slice(0, 8).map(p => renderProductCard(p)).join('')}
                        </div>
                    </div>
                </section>

                <!-- Values Section -->
                <section class="py-20 px-4 bg-gray-50">
                    <div class="max-w-7xl mx-auto">
                        <h2 class="font-display text-4xl mb-12 text-center">Почему RISHI?</h2>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                            <div class="text-center">
                                <div class="text-5xl mb-4">♻️</div>
                                <h3 class="font-display text-xl mb-3">Апсайкл</h3>
                                <p class="text-gray-600">Спасаем ткани от свалки и создаем новую жизнь.</p>
                            </div>
                            <div class="text-center">
                                <div class="text-5xl mb-4">✋</div>
                                <h3 class="font-display text-xl mb-3">Ручная работа</h3>
                                <p class="text-gray-600">Каждый предмет уникален и сделан с душой.</p>
                            </div>
                            <div class="text-center">
                                <div class="text-5xl mb-4">🌍</div>
                                <h3 class="font-display text-xl mb-3">Sustainable</h3>

        function renderProductCard(product) {
            const inWishlist = isInWishlist(product.id);
            return `
                <div class="bg-gray-50 rounded overflow-hidden group hover:shadow-lg transition-shadow">
                    <div class="relative overflow-hidden bg-white h-64">
                        <img src="${product.image}" alt="${product.name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform" loading="lazy">
                        <button onclick="window.app.toggleWishlist(${product.id})" class="absolute top-3 right-3 bg-white rounded-full w-10 h-10 flex items-center justify-center hover:bg-gray-200 transition">
                            <span class="text-lg">${inWishlist ? '❤️' : '🤍'}</span>
                        </button>
                    </div>
                    <div class="p-4">
                        <a href="#${product.category}" class="text-sm text-gray-600 hover:text-black">${CATEGORIES[product.category]?.name || product.category}</a>
                        <h3 class="font-semibold text-sm leading-tight mt-2 line-clamp-2">
                            <a href="#product-${product.id}" class="hover:text-amber-600">${product.name}</a>
                        </h3>
                        <div class="flex justify-between items-center mt-4">
                            <span class="text-lg font-bold">${formatPrice(product.price)} ₽</span>
                            <button onclick="window.app.addToCart(${product.id})" class="bg-black text-white px-3 py-1 rounded text-sm hover:bg-gray-800">
                                В корзину
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderCatalog() {
            const filtered = PRODUCTS.filter(p => {
                const matchCategory = !state.selectedFilters.category || p.category === state.selectedFilters.category;
                const matchPrice = p.price >= state.selectedFilters.priceMin && p.price <= state.selectedFilters.priceMax;
                const matchSearch = !state.searchQuery || p.name.toLowerCase().includes(state.searchQuery.toLowerCase());
                return matchCategory && matchPrice && matchSearch;
            });

            return `
                <div class="min-h-screen bg-white pt-32">
                    <div class="max-w-7xl mx-auto px-4">
                        <h1 class="font-display text-4xl mb-8">Каталог</h1>

                        <!-- Search & Filters -->
                        <div class="mb-8 space-y-4">
                            <input
                                type="text"
                                id="searchInput"
                                placeholder="Поиск по названию..."
                                class="w-full px-4 py-3 border border-gray-300 rounded focus:outline-none focus:border-amber-400"
                                value="${state.searchQuery}"
                            >

                            <!-- Filter Tabs - Fixed spacing -->
                            <div class="flex flex-wrap gap-1">
                                <button onclick="window.app.setFilter('category', null)" class="px-3 py-1.5 rounded text-sm whitespace-nowrap ${!state.selectedFilters.category ? 'bg-black text-white' : 'bg-gray-100 hover:bg-gray-200'}">
                                    Все
                                </button>
                                ${Object.entries(CATEGORIES).map(([key, cat]) => `
                                    <button onclick="window.app.setFilter('category', '${key}')" class="px-3 py-1.5 rounded text-sm whitespace-nowrap ${state.selectedFilters.category === key ? 'bg-black text-white' : 'bg-gray-100 hover:bg-gray-200'}">
                                        ${cat.name}
                                    </button>
                                `).join('')}
                            </div>

                            <!-- Price Range -->
                            <div class="space-y-2">
                                <label class="text-sm font-semibold">Цена: ${formatPrice(state.selectedFilters.priceMin)} - ${formatPrice(state.selectedFilters.priceMax)} ₽</label>
                                <input
                                    type="range"
                                    min="0"
                                    max="100000"
                                    value="${state.selectedFilters.priceMax}"
                                    class="w-full"
                                    id="priceRange"
                                >
                            </div>
                        </div>

                        <!-- Results -->
                        <div class="mb-6 text-gray-600">
                            Найдено товаров: <strong>${filtered.length}</strong>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                            ${filtered.map(p => renderProductCard(p)).join('')}
                        </div>

                        ${filtered.length === 0 ? `
                            <div class="text-center py-16 text-gray-500">
                                <p class="text-lg">Товары не найдены</p>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        function renderProduct(id) {
            const product = PRODUCTS.find(p => p.id === parseInt(id));
            if (!product) return '<div class="pt-32 text-center">Товар не найден</div>';

            const inWishlist = isInWishlist(product.id);
            const inCart = state.cart.find(item => item.id === product.id);

            return `
                <div class="min-h-screen bg-white pt-32">
                    <div class="max-w-7xl mx-auto px-4">
                        <a href="#catalog" class="text-gray-600 hover:text-black mb-8 inline-block">← Назад в каталог</a>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                            <!-- Image -->
                            <div class="bg-gray-50 rounded overflow-hidden h-96 md:h-full">
                                <img src="${product.image}" alt="${product.name}" class="w-full h-full object-cover" loading="lazy">
                            </div>

                            <!-- Info -->
                            <div class="space-y-6">
                                <div>
                                    <p class="text-sm text-gray-600 mb-2"><a href="#${product.category}" class="hover:text-black">${CATEGORIES[product.category]?.name || product.category}</a></p>
                                    <h1 class="font-display text-4xl leading-tight">${product.name}</h1>
                                </div>

                                <div class="border-t pt-6">
                                    <p class="text-4xl font-bold text-amber-600 mb-4">${formatPrice(product.price)} ₽</p>
                                    ${product.oldPrice ? `<p class="text-gray-500 line-through">${formatPrice(product.oldPrice)} ₽</p>` : ''}
                                </div>

                                <div class="space-y-3">
                                    ${!inCart ? `
                                        <button onclick="window.app.addToCart(${product.id})" class="w-full bg-black text-white py-3 rounded font-semibold hover:bg-gray-800">
                                            Добавить в корзину
                                        </button>
                                    ` : `
                                        <button onclick="window.app.removeFromCart(${product.id})" class="w-full bg-red-600 text-white py-3 rounded font-semibold hover:bg-red-700">
                                            Удалить из корзины
                                        </button>
                                    `}

                                    <button onclick="window.app.toggleWishlist(${product.id})" class="w-full border-2 border-black py-3 rounded font-semibold hover:bg-black hover:text-white transition">
                                        ${inWishlist ? '❤️ В избранном' : '🤍 Добавить в избранное'}
                                    </button>
                                </div>

                                <div class="bg-gray-50 p-4 rounded space-y-2 text-sm">
                                    <p class="flex items-center gap-2"><span>♻️</span> 100% апсайкл материал</p>
                                    <p class="flex items-center gap-2"><span>✋</span> Ручная обработка</p>
                                    <p class="flex items-center gap-2"><span>🚚</span> Доставка по России</p>
                                </div>
                            </div>
                        </div>

                        <!-- Related Products -->
                        <div class="mt-20">
                            <h2 class="font-display text-3xl mb-8">Похожие товары</h2>
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                ${PRODUCTS.filter(p => p.category === product.category && p.id !== product.id).slice(0, 4).map(p => renderProductCard(p)).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderCart() {
            const total = getCartTotal();
            return `
                <div class="min-h-screen bg-white pt-32">
                    <div class="max-w-4xl mx-auto px-4">
                        <h1 class="font-display text-4xl mb-8">Корзина</h1>

                        ${state.cart.length === 0 ? `
                            <div class="text-center py-16">
                                <p class="text-lg text-gray-600 mb-4">Корзина пуста</p>
                                <a href="#catalog" class="inline-block bg-black text-white px-6 py-3 rounded hover:bg-gray-800">
                                    Продолжить покупки
                                </a>
                            </div>
                        ` : `
                            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                <div class="lg:col-span-2 space-y-4">
                                    ${state.cart.map(item => `
                                        <div class="flex gap-4 p-4 border rounded">
                                            <img src="${item.image}" alt="${item.name}" class="w-24 h-24 object-cover rounded" loading="lazy">
                                            <div class="flex-1">
                                                <h3 class="font-semibold"><a href="#product-${item.id}" class="hover:text-amber-600">${item.name}</a></h3>
                                                <p class="text-sm text-gray-600 mt-1">${CATEGORIES[item.category]?.name || item.category}</p>
                                                <p class="text-lg font-bold mt-2">${formatPrice(item.price)} ₽</p>
                                            </div>
                                            <div class="text-right space-y-2">
                                                <input
                                                    type="number"
                                                    min="1"
                                                    value="${item.quantity}"
                                                    class="w-16 px-2 py-1 border rounded"
                                                    onchange="window.app.updateCartQuantity(${item.id}, this.value)"
                                                >
                                                <p class="text-lg font-bold">${formatPrice(item.price * item.quantity)} ₽</p>
                                                <button onclick="window.app.removeFromCart(${item.id})" class="text-red-600 text-sm hover:underline">
                                                    Удалить
                                                </button>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>

                                <div class="bg-gray-50 p-6 rounded h-fit">
                                    <h3 class="font-display text-2xl mb-4">Итого</h3>
                                    <div class="space-y-3 border-t pt-4">
                                        <div class="flex justify-between">
                                            <span class="text-gray-600">Сумма товаров:</span>
                                            <span class="font-semibold">${formatPrice(total)} ₽</span>
                                        </div>
                                        <div class="flex justify-between text-sm text-gray-600">
                                            <span>Доставка:</span>
                                            <span>Бесплатно</span>
                                        </div>
                                        <div class="flex justify-between text-xl font-bold border-t pt-4 mt-4">
                                            <span>К оплате:</span>
                                            <span>${formatPrice(total)} ₽</span>
                                        </div>
                                    </div>
                                    <button class="w-full mt-6 bg-black text-white py-3 rounded font-semibold hover:bg-gray-800">
                                        Оформить заказ
                                    </button>
                                    <a href="#catalog" class="block w-full mt-2 text-center text-gray-600 hover:text-black">
                                        Продолжить покупки
                                    </a>
                                </div>
                            </div>
                        `}
                    </div>
                </div>
            `;
        }

        function renderWishlist() {
            const wishlistProducts = PRODUCTS.filter(p => state.wishlist.includes(p.id));
            return `
                <div class="min-h-screen bg-white pt-32">
                    <div class="max-w-7xl mx-auto px-4">
                        <h1 class="font-display text-4xl mb-8">Избранное</h1>

                        ${wishlistProducts.length === 0 ? `
                            <div class="text-center py-16">
                                <p class="text-lg text-gray-600 mb-4">Ничего не добавлено</p>
                                <a href="#catalog" class="inline-block bg-black text-white px-6 py-3 rounded hover:bg-gray-800">
                                    К каталогу
                                </a>
                            </div>
                        ` : `
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                ${wishlistProducts.map(p => renderProductCard(p)).join('')}
                            </div>
                        `}
                    </div>
                </div>
            `;
        }

        function renderAbout() {
            return `
                <div class="min-h-screen bg-white pt-32">
                    <div class="max-w-4xl mx-auto px-4">
                        <h1 class="font-display text-5xl mb-8">О RISHI</h1>

                        <div class="space-y-8 text-lg text-gray-700">
                            <p>
                                RISHI — это бренд апсайкл моды, созданный с любовью к планете и уважением к мастерству.
                                Каждый предмет в нашей коллекции — это история спасения забытой ткани и превращения её во что-то прекрасное.
                            </p>

                            <div>
                                <h2 class="font-display text-3xl mb-4">Наша миссия</h2>
                                <p>
                                    Мы верим, что мода может быть устойчивой, красивой и доступной.
                                    Каждый заказ — это голос за будущее, где красота не требует жертв.
                                    RISHI создает одежду, которую можно носить с гордостью.
                                </p>
                            </div>

                            <div>
                                <h2 class="font-display text-3xl mb-4">Как мы работаем</h2>
                                <ul class="space-y-3">
                                    <li class="flex gap-3">
                                        <span class="text-2xl flex-shrink-0">♻️</span>
                                        <span><strong>Сбор материалов:</strong> Мы находим высокочастотные ткани, которые не нашли свой путь к потребителям</span>
                                    </li>
                                    <li class="flex gap-3">
                                        <span class="text-2xl flex-shrink-0">✨</span>
                                        <span><strong>Переработка:</strong> Специалисты нашей студии тщательно обрабатывают каждый материал</span>
                                    </li>
                                    <li class="flex gap-3">
                                        <span class="text-2xl flex-shrink-0">✋</span>
                                        <span><strong>Создание:</strong> Каждый предмет создается вручную с любовью и вниманием к деталям</span>
                                    </li>
                                    <li class="flex gap-3">
                                        <span class="text-2xl flex-shrink-0">🚚</span>
                                        <span><strong>Доставка:</strong> Мы отправляем вашу покупку надежно упакованной в экологичных материалах</span>
                                    </li>
                                </ul>
                            </div>

                            <div>
                                <h2 class="font-display text-3xl mb-4">Почему выбирают RISHI</h2>
                                <ul class="space-y-3">
                                    <li class="flex gap-3">
                                        <span class="flex-shrink-0">✓</span>
                                        <span>100% апсайкл — каждый предмет спасает материал от свалки</span>
                                    </li>
                                    <li class="flex gap-3">
                                        <span class="flex-shrink-0">✓</span>
                                        <span>Ручная работа — уникальность и качество каждого изделия</span>
                                    </li>
                                    <li class="flex gap-3">
                                        <span class="flex-shrink-0">✓</span>
                                        <span>Справедливые цены — мы делимся экономией с вами</span>
                                    </li>
                                    <li class="flex gap-3">
                                        <span class="flex-shrink-0">✓</span>
                                        <span>Забота о планете — ноль отходов, максимум смысла</span>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderHeader() {
            const cartCount = getCartCount();
            return `
                <header class="fixed top-0 left-0 right-0 bg-white border-b z-40">
                    <div class="max-w-7xl mx-auto px-4 h-24 flex items-center justify-between">
                        <!-- Logo -->
                        <a href="#home" class="font-display text-2xl font-bold hover:text-amber-600">RISHI</a>

                        <!-- Nav -->
                        <nav class="hidden md:flex gap-8">
                            <a href="#home" class="hover:text-amber-600">Главная</a>
                            <a href="#catalog" class="hover:text-amber-600">Каталог</a>
                            <a href="#about" class="hover:text-amber-600">О бренде</a>
                        </nav>

                        <!-- Icons -->
                        <div class="flex items-center gap-6">
                            <a href="#wishlist" class="relative hover:text-amber-600">
                                <span class="text-xl">❤️</span>
                                ${state.wishlist.length > 0 ? `<span class="absolute -top-2 -right-2 bg-amber-400 text-black text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold">${state.wishlist.length}</span>` : ''}
                            </a>
                            <a href="#cart" class="relative hover:text-amber-600">
                                <span class="text-xl">🛒</span>
                                ${cartCount > 0 ? `<span class="absolute -top-2 -right-2 bg-amber-400 text-black text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold">${cartCount}</span>` : ''}
                            </a>
                        </div>
                    </div>
                </header>
            `;
        }

        function render() {
            const app = document.getElementById('app');
            const hash = window.location.hash.slice(1) || 'home';

            let content = '';

            if (hash === 'home' || hash === '') {
                content = renderHome();
            } else if (hash === 'catalog' || Object.keys(CATEGORIES).includes(hash)) {
                state.selectedFilters.category = (hash !== 'catalog') ? hash : null;
                content = renderCatalog();
            } else if (hash.startsWith('product-')) {
                const id = hash.split('-')[1];
                content = renderProduct(id);
            } else if (hash === 'cart') {
                content = renderCart();
            } else if (hash === 'wishlist') {
                content = renderWishlist();
            } else if (hash === 'about') {
                content = renderAbout();
            } else {
                content = '<div class="pt-32 text-center text-gray-600">Страница не найдена</div>';
            }

            app.innerHTML = renderHeader() + content;

            // Attach event listeners
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    state.searchQuery = e.target.value;
                    render();
                });
            }

            const priceRange = document.getElementById('priceRange');
            if (priceRange) {
                priceRange.addEventListener('input', (e) => {
                    state.selectedFilters.priceMax = parseInt(e.target.value);
                    render();
                });
            }
        }

        // ============ APP OBJECT ============
        window.app = {
            addToCart,
            removeFromCart,
            toggleWishlist,
            setFilter: (key, value) => {
                state.selectedFilters[key] = value;
                render();
            },
            updateCartQuantity: (id, qty) => {
                const item = state.cart.find(i => i.id === id);
                if (item) {
                    item.quantity = Math.max(1, parseInt(qty) || 1);
                    saveCart();
                    render();
                }
            }
        };

        // ============ INIT ============
        window.addEventListener('hashchange', render);
        render();
    </script>
</body>
</html>
