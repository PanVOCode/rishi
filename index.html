    <style>
        @font-face {
            font-family: 'Scotch Modern';
            src: url('fonts/ScotchModern-Display.woff') format('woff');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'TT Firs Neue';
            src: url('fonts/TT_Firs_Neue_Normal.woff') format('woff');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --black: #000000;
            --white: #FFFFFF;
            --cream: #FFF8F3;
            --gold: #D4AF37;
            --gray: #666666;
            --light-gray: #E0DDD8;
        }

        body {
            font-family: 'TT Firs Neue', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--black);
            background: var(--white);
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Scotch Modern', Georgia, serif;
        }

        .font-display {
            font-family: 'Scotch Modern', Georgia, serif;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .mobile-menu {
            transition: transform 0.3s ease, opacity 0.3s ease;
            transform: translateX(-100%);
            opacity: 0;
        }

        .mobile-menu.active {
            transform: translateX(0);
            opacity: 1;
        }

        .mobile-menu-overlay {
            transition: opacity 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }

        .mobile-menu-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .animate-fade-up {
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
        }

        .animate-fade-scale {
            animation: fadeInScale 0.5s ease-out forwards;
            opacity: 0;
        }

        .animate-fade-up:nth-child(1) { animation-delay: 0.1s; }
        .animate-fade-up:nth-child(2) { animation-delay: 0.2s; }
        .animate-fade-up:nth-child(3) { animation-delay: 0.3s; }
        .animate-fade-up:nth-child(4) { animation-delay: 0.4s; }
        .animate-fade-up:nth-child(5) { animation-delay: 0.5s; }
        .animate-fade-up:nth-child(6) { animation-delay: 0.6s; }

        /* Micro-interactions */
        button, a {
            transition: all 0.2s ease;
        }

        button:active {
            transform: scale(0.98);
        }

        a:hover {
            transition: color 0.2s ease;
        }

        /* Card hover effects */
        .group {
            transition: all 0.3s ease;
        }

        .group:hover {
            transform: translateY(-4px);
        }

        /* Product card image zoom */
        .group img {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .group:hover img {
            transform: scale(1.08);
        }

        /* Smooth notification appearance */
        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .notification-appear {
            animation: slideInRight 0.3s ease-out;
        }

        /* Smooth page transitions */
        .page-content {
            animation: fadeInUp 0.4s ease-out;
        }

        /* Input focus styles */
        input:focus, textarea:focus {
            transition: all 0.2s ease;
            box-shadow: 0 0 0 3px rgba(217, 119, 6, 0.1);
        }

        /* Quick View Modal */
        .modal-overlay {
            transition: opacity 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            transition: transform 0.3s ease, opacity 0.3s ease;
            transform: scale(0.95) translateY(20px);
            opacity: 0;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
            opacity: 1;
        }
    </style>
</head>

        const CATEGORIES = {
            jeans: { name: 'Джинсы', icon: '👖' },
            leggings: { name: 'Лосины', icon: '🧬' },
            corsets: { name: 'Корсеты', icon: '💎' },
            coats: { name: 'Куртки', icon: '🧥' },
            dresses: { name: 'Платья', icon: '👗' },
            skirts: { name: 'Юбки', icon: '⛓️' },
            accessories: { name: 'Аксессуары', icon: '👜' }
        };

        // ============ STATE MANAGEMENT ============
        const state = {
            currentPage: 'home',
            cart: JSON.parse(localStorage.getItem('rishi_cart') || '[]'),
            wishlist: JSON.parse(localStorage.getItem('rishi_wishlist') || '[]'),
            searchQuery: '',
            menuOpen: false,
            sortBy: 'name',
            quickViewId: null,
            selectedFilters: {
                category: null,
                priceMin: 0,
                priceMax: 100000
            }
        };

        // ============ UTILS ============
        function formatPrice(price) {
            return new Intl.NumberFormat('ru-RU').format(price);
        }

        function saveCart() {
            localStorage.setItem('rishi_cart', JSON.stringify(state.cart));
        }

        function saveWishlist() {
            localStorage.setItem('rishi_wishlist', JSON.stringify(state.wishlist));
        }

        function addToCart(productId) {
            const product = PRODUCTS.find(p => p.id === productId);
            if (!product) return;

            const existing = state.cart.find(item => item.id === productId);
            if (existing) {
                existing.quantity += 1;
            } else {
                state.cart.push({ ...product, quantity: 1 });
            }
            saveCart();
            showNotification('Добавлено в корзину');
            render();
        }

        function removeFromCart(productId) {
            state.cart = state.cart.filter(item => item.id !== productId);
            saveCart();
            render();
        }

        function toggleWishlist(productId) {
            const idx = state.wishlist.findIndex(id => id === productId);
            if (idx >= 0) {
                state.wishlist.splice(idx, 1);
            } else {
                state.wishlist.push(productId);
            }
            saveWishlist();
            render();
        }

        function isInWishlist(productId) {
            return state.wishlist.includes(productId);
        }

        function getCartTotal() {
            return state.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        }

        function getCartCount() {
            return state.cart.reduce((sum, item) => sum + item.quantity, 0);
        }

        function showNotification(msg) {
            const notif = document.createElement('div');
            notif.className = 'fixed top-24 right-4 bg-black text-white px-6 py-3 rounded z-50 font-semibold notification-appear';
            notif.textContent = msg;
            document.body.appendChild(notif);
            setTimeout(() => {
                notif.style.opacity = '0';
                notif.style.transform = 'translateX(100px)';
                notif.style.transition = 'all 0.3s ease';
                setTimeout(() => notif.remove(), 300);
            }, 1700);
        }

        // ============ PAGE RENDERERS ============

                <!-- Featured Products Section -->
                <section class="py-20 px-4 bg-white">

                <!-- Values Section -->
                <section class="py-20 px-4 bg-gray-50">
                    <div class="max-w-7xl mx-auto">

                            <div class="text-center">
                                <div class="text-5xl mb-4">♻️</div>

        function renderProductCard(product) {
            const inWishlist = isInWishlist(product.id);
            return `
                <div class="bg-gray-50 rounded overflow-hidden group hover:shadow-xl transition-all duration-300">
                    <div class="relative overflow-hidden bg-white h-64">
                        <img src="${product.image}" alt="${product.name}" class="w-full h-full object-cover transition-transform duration-500 ease-out group-hover:scale-108" loading="lazy">

                        <!-- Action buttons overlay -->
                        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/40 transition-colors duration-300 flex items-center justify-center opacity-0 group-hover:opacity-100">
                            <button onclick="window.app.openQuickView(${product.id})" class="bg-white text-black px-6 py-2 rounded font-semibold hover:bg-amber-400 transition-colors transform -translate-y-2 group-hover:translate-y-0">
                                Просмотр
                            </button>
                        </div>

                        <button onclick="window.app.toggleWishlist(${product.id})" class="absolute top-3 right-3 bg-white rounded-full w-10 h-10 flex items-center justify-center hover:bg-amber-100 hover:scale-110 transition-all duration-200 shadow hover:shadow-md z-10">
                            <span class="text-lg transform transition-transform duration-300 ${inWishlist ? 'scale-110' : ''}">${inWishlist ? '❤️' : '🤍'}</span>
                        </button>
                    </div>
                    <div class="p-4">
                        <a href="#${product.category}" class="text-sm text-gray-600 hover:text-amber-600 transition-colors duration-200">${CATEGORIES[product.category]?.name || product.category}</a>
                        <h3 class="font-semibold text-sm leading-tight mt-2 line-clamp-2">
                            <a href="#product-${product.id}" class="hover:text-amber-600 transition-colors duration-200">${product.name}</a>
                        </h3>
                        <div class="flex justify-between items-center mt-4">
                            <span class="text-lg font-bold text-amber-600">${formatPrice(product.price)} ₽</span>
                            <button onclick="window.app.addToCart(${product.id})" class="bg-black text-white px-3 py-1.5 rounded text-sm hover:bg-amber-600 hover:scale-105 transition-all duration-200 active:scale-95 font-semibold">
                                В корзину
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderCatalog() {
            let filtered = PRODUCTS.filter(p => {
                const matchCategory = !state.selectedFilters.category || p.category === state.selectedFilters.category;
                const matchPrice = p.price >= state.selectedFilters.priceMin && p.price <= state.selectedFilters.priceMax;
                const matchSearch = !state.searchQuery || p.name.toLowerCase().includes(state.searchQuery.toLowerCase());
                return matchCategory && matchPrice && matchSearch;
            });

            // Sort
            if (state.sortBy === 'price-asc') {
                filtered.sort((a, b) => a.price - b.price);
            } else if (state.sortBy === 'price-desc') {
                filtered.sort((a, b) => b.price - a.price);
            } else if (state.sortBy === 'name') {
                filtered.sort((a, b) => a.name.localeCompare(b.name, 'ru'));
            }

            return `
                <div class="min-h-screen bg-white pt-32">
                    <div class="max-w-7xl mx-auto px-4">
                        <h1 class="font-display text-4xl mb-8">Каталог</h1>

                        <!-- Search & Filters -->

                                <ul class="space-y-2 text-sm text-gray-400">
                                    <li><a href="#about" class="hover:text-amber-400 transition-colors">О бренде</a></li>
                                    <li><a href="#contacts" class="hover:text-amber-400 transition-colors">Контакты</a></li>
                                    <li><a href="#" class="hover:text-amber-400 transition-colors">Политика</a></li>
                                    <li><a href="#" class="hover:text-amber-400 transition-colors">FAQ</a></li>
                                </ul>
                            </div>

                            <!-- Subscribe -->
                            <div>
                                <h4 class="font-semibold mb-4">Подписка</h4>
                                <p class="text-sm text-gray-400 mb-4">Получайте обновления о новых коллекциях</p>
                                <div class="flex gap-2">
                                    <input type="email" placeholder="Ваш email" class="flex-1 px-3 py-2 rounded text-black text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
                                    <button class="bg-amber-400 text-black px-4 py-2 rounded font-semibold hover:bg-amber-300 transition-colors">→</button>
                                </div>
                            </div>
                        </div>

                        <!-- Divider -->
                        <div class="border-t border-gray-800 pt-8">
                            <div class="flex flex-col md:flex-row justify-between items-center text-sm text-gray-400">
                                <p>&copy; 2026 RISHI. Все права защищены.</p>
                                <div class="flex gap-6 mt-4 md:mt-0">
                                    <a href="#" class="hover:text-amber-400 transition-colors">Политика конфиденциальности</a>
                                    <a href="#" class="hover:text-amber-400 transition-colors">Условия использования</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </footer>
            `;
        }

        function renderQuickViewModal() {
            if (!state.quickViewId) return '';
            const product = PRODUCTS.find(p => p.id === state.quickViewId);
            if (!product) return '';

            const inWishlist = isInWishlist(product.id);
            const inCart = state.cart.find(item => item.id === product.id);

            return `
                <div class="modal-overlay ${state.quickViewId ? 'active' : ''} fixed inset-0 bg-black/50 z-50" onclick="if(event.target === this) window.app.closeQuickView()">
                    <div class="modal-content fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white rounded-lg max-w-2xl w-full mx-4 max-h-screen overflow-y-auto z-50">
                        <button onclick="window.app.closeQuickView()" class="absolute top-4 right-4 text-2xl hover:text-amber-600 z-10">✕</button>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 p-6">
                            <!-- Image -->
                            <div class="bg-gray-50 rounded overflow-hidden h-80 md:h-full">
                                <img src="${product.image}" alt="${product.name}" class="w-full h-full object-cover" loading="lazy">
                            </div>

                            <!-- Info -->
                            <div class="space-y-4">
                                <div>
                                    <p class="text-sm text-gray-600 mb-1"><a href="#${product.category}" class="hover:text-black" onclick="window.app.closeQuickView()">${CATEGORIES[product.category]?.name || product.category}</a></p>
                                    <h2 class="font-display text-2xl">${product.name}</h2>
                                </div>

                                <div class="flex items-baseline gap-3">
                                    <span class="text-3xl font-bold text-amber-600">${formatPrice(product.price)} ₽</span>
                                    ${product.oldPrice ? `<span class="text-gray-500 line-through">${formatPrice(product.oldPrice)} ₽</span>` : ''}
                                </div>

                                <div class="space-y-2">
                                    ${!inCart ? `
                                        <button onclick="window.app.addToCart(${product.id}); window.app.closeQuickView();" class="w-full bg-black text-white py-2 rounded font-semibold hover:bg-gray-800 transition-colors">
                                            Добавить в корзину
                                        </button>
                                    ` : `
                                        <button onclick="window.app.removeFromCart(${product.id}); window.app.closeQuickView();" class="w-full bg-red-600 text-white py-2 rounded font-semibold hover:bg-red-700 transition-colors">
                                            Удалить из корзины
                                        </button>
                                    `}

                                    <button onclick="window.app.toggleWishlist(${product.id})" class="w-full border-2 border-black py-2 rounded font-semibold hover:bg-black hover:text-white transition-colors">
                                        ${inWishlist ? '❤️ В избранном' : '🤍 Добавить в избранное'}
                                    </button>
                                </div>

                                <div class="bg-gray-50 p-4 rounded text-sm space-y-2">
                                    <p class="flex items-center gap-2"><span>♻️</span> 100% апсайкл</p>
                                    <p class="flex items-center gap-2"><span>✋</span> Ручная работа</p>
                                    <p class="flex items-center gap-2"><span>🚚</span> Доставка РФ</p>
                                </div>

                                <a href="#product-${product.id}" onclick="window.app.closeQuickView()" class="block text-center text-amber-600 hover:text-amber-700 font-semibold transition-colors">
                                    Полный просмотр →
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderHeader() {
            const cartCount = getCartCount();
            return `
                <header class="fixed top-0 left-0 right-0 bg-white border-b z-40">
                    <div class="max-w-7xl mx-auto px-4 h-24 flex items-center justify-between">
                        <!-- Logo -->
                        <a href="#home" class="font-display text-2xl font-bold hover:text-amber-600">RISHI</a>

                        <!-- Nav Desktop -->
                        <nav class="hidden md:flex gap-8">
                            <a href="#home" class="hover:text-amber-600">Главная</a>
                            <a href="#catalog" class="hover:text-amber-600">Каталог</a>
                            <a href="#about" class="hover:text-amber-600">О бренде</a>
                            <a href="#contacts" class="hover:text-amber-600">Контакты</a>
                        </nav>

                        <!-- Icons -->
                        <div class="flex items-center gap-4 md:gap-6">
                            <a href="#wishlist" class="relative hover:text-amber-600">
                                <span class="text-xl">❤️</span>
                                ${state.wishlist.length > 0 ? `<span class="absolute -top-2 -right-2 bg-amber-400 text-black text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold">${state.wishlist.length}</span>` : ''}
                            </a>
                            <a href="#cart" class="relative hover:text-amber-600">
                                <span class="text-xl">🛒</span>
                                ${cartCount > 0 ? `<span class="absolute -top-2 -right-2 bg-amber-400 text-black text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold">${cartCount}</span>` : ''}
                            </a>
                            <!-- Burger Menu Mobile -->
                            <button onclick="window.app.toggleMenu()" class="md:hidden text-2xl">☰</button>
                        </div>
                    </div>
                </header>

                <!-- Mobile Menu Overlay -->
                <div class="mobile-menu-overlay ${state.menuOpen ? 'active' : ''} fixed inset-0 bg-black/50 z-30 md:hidden" onclick="window.app.toggleMenu()"></div>

                <!-- Mobile Menu -->
                <nav class="mobile-menu ${state.menuOpen ? 'active' : ''} fixed left-0 top-24 h-screen w-64 bg-white z-30 md:hidden flex flex-col p-6 gap-4">
                    <a href="#home" onclick="window.app.toggleMenu()" class="text-lg font-semibold hover:text-amber-600">Главная</a>
                    <a href="#catalog" onclick="window.app.toggleMenu()" class="text-lg font-semibold hover:text-amber-600">Каталог</a>
                    <a href="#jeans" onclick="window.app.toggleMenu()" class="text-lg font-semibold hover:text-amber-600">Джинсы</a>
                    <a href="#corsets" onclick="window.app.toggleMenu()" class="text-lg font-semibold hover:text-amber-600">Корсеты</a>
                    <a href="#dresses" onclick="window.app.toggleMenu()" class="text-lg font-semibold hover:text-amber-600">Платья</a>
                    <a href="#coats" onclick="window.app.toggleMenu()" class="text-lg font-semibold hover:text-amber-600">Куртки</a>
                    <a href="#about" onclick="window.app.toggleMenu()" class="text-lg font-semibold hover:text-amber-600">О бренде</a>
                    <a href="#contacts" onclick="window.app.toggleMenu()" class="text-lg font-semibold hover:text-amber-600">Контакты</a>
                </nav>
            `;
        }

        function render() {
            const app = document.getElementById('app');
            const hash = window.location.hash.slice(1) || 'home';

            let content = '';

            if (hash === 'home' || hash === '') {
                content = renderHome();
            } else if (hash === 'catalog' || Object.keys(CATEGORIES).includes(hash)) {
                state.selectedFilters.category = (hash !== 'catalog') ? hash : null;
                content = renderCatalog();
            } else if (hash.startsWith('product-')) {
                const id = hash.split('-')[1];
                content = renderProduct(id);
            } else if (hash === 'cart') {
                content = renderCart();
            } else if (hash === 'wishlist') {
                content = renderWishlist();
            } else if (hash === 'about') {
                content = renderAbout();
            } else if (hash === 'contacts') {
                content = renderContacts();
            } else if (hash === 'collections') {
                content = renderCollections();
            } else {
                content = '<div class="pt-32 text-center text-gray-600">Страница не найдена</div>';
            }

            app.innerHTML = renderHeader() + content + renderFooter() + renderQuickViewModal();

            // Attach event listeners
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    state.searchQuery = e.target.value;
                    render();
                });
            }

            const priceRange = document.getElementById('priceRange');
            if (priceRange) {
                priceRange.addEventListener('input', (e) => {
                    state.selectedFilters.priceMax = parseInt(e.target.value);
                    render();
                });
            }

            const sortSelect = document.getElementById('sortSelect');
            if (sortSelect) {
                sortSelect.addEventListener('change', (e) => {
                    state.sortBy = e.target.value;
                    render();
                });
            }

            // Setup Intersection Observer for animations
            setTimeout(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.remove('animate-fade-up', 'animate-fade-scale');
                            entry.target.offsetHeight; // trigger reflow
                            entry.target.classList.add('animate-fade-up');
                            observer.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.1 });

                // Observe product cards and sections
                document.querySelectorAll('.grid > div, section > *').forEach(el => {
                    if (el.querySelector('img') || el.classList.contains('text-center')) {
                        observer.observe(el);
                    }
                });
            }, 100);
        }

        // ============ APP OBJECT ============
        window.app = {
            addToCart,
            removeFromCart,
            toggleWishlist,
            toggleMenu: () => {
                state.menuOpen = !state.menuOpen;
                render();
            },
            openQuickView: (id) => {
                state.quickViewId = id;
                document.body.style.overflow = 'hidden';
                render();
            },
            closeQuickView: () => {
                state.quickViewId = null;
                document.body.style.overflow = 'auto';
                render();
            },
            setFilter: (key, value) => {
                state.selectedFilters[key] = value;
                render();
            },
            updateCartQuantity: (id, qty) => {
                const item = state.cart.find(i => i.id === id);
                if (item) {
                    item.quantity = Math.max(1, parseInt(qty) || 1);
                    saveCart();
                    render();
                }
            }
        };

        // ============ INIT ============
        window.addEventListener('hashchange', render);
        render();
    </script>
</body>
</html>
